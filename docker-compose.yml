services:
  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifelog}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # TODO: Extract transcription into a dedicated service for better scaling.
  # To do so: (1) Create a separate Dockerfile with faster-whisper deps,
  # (2) Add a new service in docker-compose with its own concurrency config,
  # (3) Route transcription tasks to a dedicated Celery queue (-Q transcription),
  # (4) Keep the celery worker here for non-ML tasks only.
  celery:
    build: ./backend
    env_file: .env
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${TRANSCRIPTION_CONCURRENCY:-1}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - whisper-models:/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  whisper-models:
